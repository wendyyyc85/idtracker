<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>室內設計轉職進度追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2e2e2e;
  --text: #e8e4dc;
  --text2: #888;
  --text3: #555;
  --cad: #4a9eff;
  --sku: #3ecf8e;
  --draw: #f07baa;
  --port: #a78bfa;
  --model: #fb923c;
  --done: #3ecf8e;
  --accent: #e8e4dc;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 120px;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.app-title { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
.app-sub { font-size: 11px; color: var(--text2); margin-top: 1px; font-family: 'DM Mono', monospace; }
.week-nav { display: flex; align-items: center; gap: 10px; }
.nav-btn {
  width: 32px; height: 32px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.nav-btn:active { background: var(--border); }
.week-indicator {
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Mono', monospace;
  min-width: 60px;
  text-align: center;
}

/* Progress bar */
.progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; }
.progress-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cad), var(--sku)); transition: width .4s ease; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}
.stat-num { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

/* Week selector dots */
.week-dots {
  display: flex;
  gap: 4px;
  padding: 10px 20px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.week-dots::-webkit-scrollbar { display: none; }
.week-dot {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 10px;
  font-weight: 500;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.week-dot.active { border-color: var(--accent); color: var(--accent); background: rgba(232,228,220,.08); }
.week-dot.complete { background: var(--done); border-color: var(--done); color: #000; }
.week-dot.partial { border-color: var(--sku); color: var(--sku); }

/* Main content */
.main { padding: 16px 20px; }
.week-title-block { margin-bottom: 16px; }
.week-title-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .08em; }
.week-title-text { font-size: 17px; font-weight: 700; margin-top: 4px; line-height: 1.3; }
.week-phase { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--text2); margin-top: 6px; font-family: 'DM Mono', monospace; }
.model-badge { background: rgba(251,146,60,.15); color: var(--model); border: 1px solid rgba(251,146,60,.3); margin-left: 6px; }

/* Task cards */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s;
}
.task-card.checked { border-color: rgba(62,207,142,.3); background: rgba(62,207,142,.04); }
.task-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
}
.task-tag {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  min-width: 58px;
  text-align: center;
}
.tag-cad { background: rgba(74,158,255,.15); color: var(--cad); }
.tag-sku { background: rgba(62,207,142,.15); color: var(--sku); }
.tag-draw { background: rgba(240,123,170,.15); color: var(--draw); }
.tag-port { background: rgba(167,139,250,.15); color: var(--port); }
.tag-model { background: rgba(251,146,60,.15); color: var(--model); }

.task-title { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.4; }
.task-check {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all .2s;
  background: transparent;
  cursor: pointer;
}
.task-check.done { background: var(--done); border-color: var(--done); color: #000; }

.task-detail {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  padding: 0 16px 14px 16px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: none;
}
.task-detail.open { display: block; }

/* Check button */
.check-btn {
  width: calc(100% - 40px);
  margin: 0 20px 16px;
  padding: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .2s;
}
.check-btn.all-done {
  background: rgba(62,207,142,.12);
  border-color: rgba(62,207,142,.4);
  color: var(--done);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 0;
  cursor: pointer;
  color: var(--text3);
  font-size: 10px;
  transition: color .15s;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; }

/* Overview page */
.overview-page { display: none; padding: 16px 20px; }
.overview-page.active { display: block; }
.overview-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.month-section { margin-bottom: 20px; }
.month-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.overview-week-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color .15s;
}
.overview-week-row:active { border-color: var(--border); }
.ow-num { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); width: 36px; flex-shrink: 0; }
.ow-info { flex: 1; }
.ow-title { font-size: 12px; font-weight: 500; line-height: 1.3; }
.ow-tasks { font-size: 11px; color: var(--text2); margin-top: 2px; }
.ow-dots { display: flex; gap: 3px; flex-shrink: 0; }
.ow-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--border); }
.ow-dot.done-dot { background: var(--done); border-color: var(--done); }

/* Streak page */
.streak-page { display: none; padding: 16px 20px; }
.streak-page.active { display: block; }
.streak-big {
  text-align: center;
  padding: 40px 0 30px;
}
.streak-num { font-size: 72px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
.streak-label { font-size: 14px; color: var(--text2); margin-top: 8px; }
.heatmap { display: grid; grid-template-columns: repeat(17, 1fr); gap: 3px; margin-top: 24px; }
.heat-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: var(--surface2);
  cursor: pointer;
}
.heat-cell.h1 { background: rgba(62,207,142,.25); }
.heat-cell.h2 { background: rgba(62,207,142,.5); }
.heat-cell.h3 { background: rgba(62,207,142,.75); }
.heat-cell.h4 { background: var(--done); }
.heat-legend { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 6px; font-size: 10px; color: var(--text3); }
.heat-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.tracker-page { padding: 0; }
.tracker-page.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">室內設計轉職</div>
      <div class="app-sub" id="header-sub">進度追蹤</div>
    </div>
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-indicator" id="week-indicator">W1</div>
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div class="stats-row" id="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">總週數</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-done-weeks">0</div>
    <div class="stat-label">完成週</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-tasks">0</div>
    <div class="stat-label">已打卡</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-streak">0</div>
    <div class="stat-label">連續天</div>
  </div>
</div>

<div class="week-dots" id="week-dots"></div>

<!-- Tracker page -->
<div class="tracker-page active" id="page-tracker">
  <div class="main">
    <div class="week-title-block">
      <div class="week-title-label" id="week-label">Week 1</div>
      <div class="week-title-text" id="week-title">載入中...</div>
      <div>
        <span class="week-phase" id="week-phase"></span>
        <span class="week-phase model-badge" id="model-badge" style="display:none">📦 模型週</span>
      </div>
    </div>
    <div id="task-list"></div>
  </div>
  <button class="check-btn" id="check-all-btn" onclick="checkAllTasks()">
    <span id="check-all-icon">○</span>
    <span id="check-all-text">本週全部打卡</span>
  </button>
</div>

<!-- Overview page -->
<div class="overview-page" id="page-overview">
  <div class="overview-title">完整進度表</div>
  <div id="overview-content"></div>
</div>

<!-- Streak page -->
<div class="streak-page" id="page-streak">
  <div class="streak-big">
    <div class="streak-num" id="streak-display">0</div>
    <div class="streak-label">連續打卡天數</div>
  </div>
  <div class="heatmap" id="heatmap"></div>
  <div class="heat-legend">
    少 <div class="heat-legend-dot" style="background:var(--surface2)"></div>
    <div class="heat-legend-dot heat-legend-dot" style="background:rgba(62,207,142,.25)"></div>
    <div class="heat-legend-dot" style="background:rgba(62,207,142,.5)"></div>
    <div class="heat-legend-dot" style="background:rgba(62,207,142,.75)"></div>
    <div class="heat-legend-dot" style="background:var(--done)"></div> 多
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="nav-tracker" onclick="switchPage('tracker')">
    <div class="nav-icon">📋</div>
    <div>本週</div>
  </div>
  <div class="nav-item" id="nav-overview" onclick="switchPage('overview')">
    <div class="nav-icon">📅</div>
    <div>總覽</div>
  </div>
  <div class="nav-item" id="nav-streak" onclick="switchPage('streak')">
    <div class="nav-icon">🔥</div>
    <div>連續</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEEKS = [
  {
    id: 0, label: "週 1～3", phase: "四月 · 暖身期", isModel: false,
    title: "軟體手感回來 · 靈感蒐集開始",
    tasks: [
      { type: "cad", title: "AutoCAD 基礎指令", detail: "跟著 CAD CAM Tutorials 操作：直線、偏移、修剪、圓弧指令。目標是這三個指令用起來不需要想。" },
      { type: "sku", title: "SketchUp 介面熟悉", detail: "介面熟悉：推拉工具、軌道旋轉、捲尺工具。跟著 The SketchUp Essentials 操作一遍。" },
      { type: "port", title: "Pinterest 靈感板建立", detail: "建立靈感板，開始存喜歡的室內設計案例，試著依六面向框架分析風格：風格定位、色彩、材質、光線、陳設、直覺反應。" }
    ]
  },
  {
    id: 1, label: "第 1 週", phase: "五月 · 工具紮根", isModel: false,
    title: "CAD 基礎指令 · SketchUp 推拉建牆 · 手繪線條",
    tasks: [
      { type: "cad", title: "AutoCAD 空白房間", detail: "複習核心指令：Line、Offset、Trim、Extend、Fillet。練習題：畫一個 4m×3m 的空白房間，牆厚 15cm，標完尺寸。" },
      { type: "sku", title: "SketchUp 空間盒子", detail: "從零建一個空白方盒子空間（5m×4m×2.8m），練習 Push/Pull、Move、尺寸輸入。" },
      { type: "draw", title: "手繪線條基礎", detail: "A4 紙畫直線、平行線、等距線，不用尺，目標整齊均勻。每天 15 分鐘，這週先只練線。" },
      { type: "port", title: "作品集方向確定", detail: "決定兩個案子的空間類型（建議：套房 ＋ 客餐廳），開始蒐集對應風格的參考圖。" }
    ]
  },
  {
    id: 2, label: "第 2 週", phase: "五月 · 工具紮根", isModel: false,
    title: "CAD 圖層管理 · SketchUp 門窗 · 手繪平面符號",
    tasks: [
      { type: "cad", title: "AutoCAD 圖層與門窗", detail: "學圖層（Layer）：建立牆體、門窗、家具、標註各自圖層，設定顏色與線型。在上週房間加入一扇門、一扇窗。" },
      { type: "sku", title: "SketchUp 開門窗洞", detail: "在盒子上開門洞（用 Push/Pull 貫穿牆體）、開窗洞。從 3D Warehouse 抓一扇門、一扇窗模型放入。" },
      { type: "draw", title: "室內設計符號練習", detail: "單扇門（弧線表示開啟方向）、推拉窗、浴缸、馬桶、洗手台。每個符號畫 10 遍。" },
      { type: "port", title: "案子1 Mood Board 初稿", detail: "收集 10～15 張參考圖，標出你喜歡的色彩、材質、風格關鍵字。" }
    ]
  },
  {
    id: 3, label: "第 3 週", phase: "五月 · 工具紮根", isModel: true,
    title: "CAD 家具配置 · SketchUp 家具抓模 · 手繪家具俯視",
    tasks: [
      { type: "cad", title: "AutoCAD Block 與家具配置", detail: "學 Block（圖塊）：把沙發、床、桌子存成圖塊，在平面圖上插入並調整位置。畫一個完整的套房平面家具配置圖。" },
      { type: "sku", title: "SketchUp 家具放入空間", detail: "從 3D Warehouse 抓沙發、茶几、床鋪，放入空間，練習移動與旋轉工具對齊家具。" },
      { type: "draw", title: "家具俯視圖練習", detail: "沙發組（L型、一字型）、雙人床、餐桌椅、書桌。不用尺，練習比例感。" },
      { type: "port", title: "案子1 設計概念確定", detail: "用文字寫出你的設計想法（2～3 句），這會成為作品集的設計說明。" },
      { type: "model", title: "模型週：純空間盒子", detail: "五月暖身模型：純空間盒子 1:50，無家具。把比例感找回來，感受空間高度與寬度的關係。不需要家具、材質、顏色，越簡單越好。" }
    ]
  },
  {
    id: 4, label: "第 4 週", phase: "五月 · 工具紮根", isModel: false,
    title: "CAD 完整套房輸出 · SketchUp 視角調整 · 手繪平面整合",
    tasks: [
      { type: "cad", title: "完整 15 坪套房平面圖", detail: "完成一張完整的 15 坪套房平面圖：牆體、門窗、家具配置、房間標示、尺寸標註全部到位。練習 Layout 出圖設定。" },
      { type: "sku", title: "SketchUp Scene 場景設定", detail: "學 Scene（場景）：設定 3～4 個固定視角，練習用 Section Plane 做剖面視圖。" },
      { type: "draw", title: "徒手畫套房平面圖", detail: "整合練習：徒手畫一間套房平面圖（不用尺），包含家具配置，感受整體空間關係。" },
      { type: "port", title: "案子1 手繪草稿", detail: "在紙上手繪初版配置（不需精準），確定空間分區與動線方向。" }
    ]
  },
  {
    id: 5, label: "第 5 週", phase: "六月 · 立體化", isModel: false,
    title: "CAD 立面圖入門 · SketchUp 匯入平面圖 · 手繪立面比例",
    tasks: [
      { type: "cad", title: "AutoCAD 立面圖基礎", detail: "學立面圖概念：從平面圖延伸出立面線，畫出一面牆的立面（含門窗位置、高度標示）。" },
      { type: "sku", title: "匯入 CAD 平面圖建模", detail: "把第 4 週的 CAD 平面圖匯入 SketchUp（DWG 格式），依平面圖描牆體拉高，建立正式空間模型。" },
      { type: "draw", title: "立面比例格線練習", detail: "A4 紙用鉛筆打格線，在格線上畫牆面（寬 4m、高 2.8m），感受比例。" },
      { type: "port", title: "案子1 CAD 平面圖開始", detail: "依手繪草稿在 AutoCAD 畫精確版，牆體完成即可，家具下週加。" }
    ]
  },
  {
    id: 6, label: "第 6 週", phase: "六月 · 立體化", isModel: true,
    title: "CAD 立面完成 · SketchUp 材質套用 · 手繪立面一面牆",

const TAG_MAP = { cad: "AutoCAD", sku: "SketchUp", draw: "手繪", port: "作品集", model: "模型" };
const TAG_CLASS = { cad: "tag-cad", sku: "tag-sku", draw: "tag-draw", port: "tag-port", model: "tag-model" };

let currentWeek = 0;
let currentPage = 'tracker';
let data = {};
let checkDates = [];

function loadData() {
  try {
    const raw = localStorage.getItem('idtracker_v1');
    if (raw) { const parsed = JSON.parse(raw); data = parsed.data || {}; checkDates = parsed.checkDates || []; }
  } catch(e) {}
}

function saveData() {
  try { localStorage.setItem('idtracker_v1', JSON.stringify({ data, checkDates })); } catch(e) {}
}

function getKey(weekIdx, taskIdx) { return `w${weekIdx}_t${taskIdx}`; }

function isTaskDone(weekIdx, taskIdx) { return data[getKey(weekIdx, taskIdx)] === true; }

function toggleTask(weekIdx, taskIdx) {
  const key = getKey(weekIdx, taskIdx);
  data[key] = !data[key];
  const today = new Date().toDateString();
  if (data[key] && !checkDates.includes(today)) checkDates.push(today);
  saveData();
  renderWeek(weekIdx);
  updateStats();
  updateDots();
}

function checkAllTasks() {
  const week = WEEKS[currentWeek];
  const allDone = week.tasks.every((_, i) => isTaskDone(currentWeek, i));
  const today = new Date().toDateString();
  week.tasks.forEach((_, i) => {
    data[getKey(currentWeek, i)] = !allDone;
  });
  if (!allDone && !checkDates.includes(today)) checkDates.push(today);
  saveData();
  renderWeek(currentWeek);
  updateStats();
  updateDots();
  showToast(allDone ? "已取消本週打卡" : "🎉 本週全部完成！");
}

function getWeekCompletion(weekIdx) {
  const week = WEEKS[weekIdx];
  const done = week.tasks.filter((_, i) => isTaskDone(weekIdx, i)).length;
  return { done, total: week.tasks.length };
}

function renderWeek(weekIdx) {
  const week = WEEKS[weekIdx];
  document.getElementById('week-label').textContent = week.label;
  document.getElementById('week-title').textContent = week.title;
  document.getElementById('week-phase').textContent = week.phase;
  document.getElementById('model-badge').style.display = week.isModel ? 'inline-block' : 'none';
  document.getElementById('week-indicator').textContent = weekIdx === 0 ? 'W0' : 'W' + weekIdx;
  document.getElementById('header-sub').textContent = week.label + ' · ' + week.phase;

  const list = document.getElementById('task-list');
  list.innerHTML = '';
  week.tasks.forEach((task, i) => {
    const done = isTaskDone(weekIdx, i);
    const card = document.createElement('div');
    card.className = 'task-card' + (done ? ' checked' : '');
    card.innerHTML = `
      <div class="task-header" onclick="toggleDetail('detail-${weekIdx}-${i}')">
        <span class="task-tag ${TAG_CLASS[task.type]}">${TAG_MAP[task.type]}</span>
        <span class="task-title">${task.title}</span>
        <div class="task-check ${done ? 'done' : ''}" onclick="event.stopPropagation();toggleTask(${weekIdx},${i})">
          ${done ? '✓' : ''}
        </div>
      </div>
      <div class="task-detail" id="detail-${weekIdx}-${i}">${task.detail}</div>
    `;
    list.appendChild(card);
  });

  const { done, total } = getWeekCompletion(weekIdx);
  const allDone = done === total;
  const btn = document.getElementById('check-all-btn');
  btn.className = 'check-btn' + (allDone ? ' all-done' : '');
  document.getElementById('check-all-icon').textContent = allDone ? '✓' : '○';
  document.getElementById('check-all-text').textContent = allDone ? '本週已全部完成' : '本週全部打卡';
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function updateStats() {
  const totalTasks = WEEKS.reduce((s, w, i) => s + w.tasks.filter((_, j) => isTaskDone(i, j)).length, 0);
  const doneWeeks = WEEKS.filter((w, i) => getWeekCompletion(i).done === w.tasks.length).length;
  const streak = calcStreak();
  document.getElementById('stat-total').textContent = WEEKS.length;
  document.getElementById('stat-done-weeks').textContent = doneWeeks;
  document.getElementById('stat-tasks').textContent = totalTasks;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('streak-display').textContent = streak;
  const totalPossible = WEEKS.reduce((s, w) => s + w.tasks.length, 0);
  document.getElementById('progress-bar').style.width = Math.round(totalTasks / totalPossible * 100) + '%';
}

function calcStreak() {
  if (!checkDates.length) return 0;
  const sorted = [...new Set(checkDates)].sort((a, b) => new Date(b) - new Date(a));
  let streak = 0;
  let cur = new Date();
  cur.setHours(0,0,0,0);
  for (let d of sorted) {
    const dd = new Date(d);
    dd.setHours(0,0,0,0);
    const diff = Math.round((cur - dd) / 86400000);
    if (diff <= 1) { streak++; cur = dd; }
    else break;
  }
  return streak;
}

function updateDots() {
  const container = document.getElementById('week-dots');
  container.innerHTML = '';
  WEEKS.forEach((w, i) => {
    const { done, total } = getWeekCompletion(i);
    const dot = document.createElement('div');
    dot.className = 'week-dot';
    dot.textContent = i === 0 ? '★' : i;
    if (i === currentWeek) dot.classList.add('active');
    if (done === total && total > 0) dot.classList.add('complete');
    else if (done > 0) dot.classList.add('partial');
    dot.onclick = () => { currentWeek = i; renderWeek(i); updateDots(); scrollDotIntoView(i); };
    container.appendChild(dot);
  });
}

function scrollDotIntoView(idx) {
  const dots = document.querySelectorAll('.week-dot');
  if (dots[idx]) dots[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function changeWeek(dir) {
  const next = currentWeek + dir;
  if (next >= 0 && next < WEEKS.length) {
    currentWeek = next;
    renderWeek(currentWeek);
    updateDots();
    scrollDotIntoView(currentWeek);
    if (currentPage !== 'tracker') switchPage('tracker');
  }
}

function renderOverview() {
  const months = [
    { label: "四月底前 · 暖身期", range: [0, 0] },
    { label: "五月 · 工具紮根", range: [1, 4] },
    { label: "六月 · 立體化", range: [5, 8] },
    { label: "七月 · 案子1完成", range: [9, 12] },
    { label: "八月 · 案子2完成", range: [13, 16] },
    { label: "九月起 · 求職衝刺", range: [17, 17] },
  ];
  const container = document.getElementById('overview-content');
  container.innerHTML = '';
  months.forEach(m => {
    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.innerHTML = `<div class="month-label">${m.label}</div>`;
    for (let i = m.range[0]; i <= m.range[1]; i++) {
      const w = WEEKS[i];
      const { done, total } = getWeekCompletion(i);
      const row = document.createElement('div');
      row.className = 'overview-week-row';
      const dotsHtml = w.tasks.map((_, j) => `<div class="ow-dot ${isTaskDone(i,j)?'done-dot':''}"></div>`).join('');
      row.innerHTML = `
        <div class="ow-num">${w.label}</div>
        <div class="ow-info">
          <div class="ow-title">${w.title}</div>
          <div class="ow-tasks">${done}/${total} 項完成</div>
        </div>
        <div class="ow-dots">${dotsHtml}</div>
      `;
      row.onclick = () => { currentWeek = i; renderWeek(i); switchPage('tracker'); updateDots(); scrollDotIntoView(i); };
      sec.appendChild(row);
    }
    container.appendChild(sec);
  });
}

function renderHeatmap() {
  const hm = document.getElementById('heatmap');
  hm.innerHTML = '';
  const now = new Date();
  for (let i = 16; i >= 0; i--) {
    const week = WEEKS[i];
    const { done, total } = getWeekCompletion(i);
    const level = total === 0 ? 0 : Math.ceil(done / total * 4);
    const cell = document.createElement('div');
    cell.className = `heat-cell h${level}`;
    cell.title = week.label;
    cell.onclick = () => { currentWeek = i; renderWeek(i); switchPage('tracker'); updateDots(); };
    hm.appendChild(cell);
  }
}

function switchPage(page) {
  currentPage = page;
  document.getElementById('page-tracker').style.display = page === 'tracker' ? 'block' : 'none';
  document.getElementById('page-overview').classList.toggle('active', page === 'overview');
  document.getElementById('page-streak').classList.toggle('active', page === 'streak');
  ['tracker','overview','streak'].forEach(p => {
    document.getElementById('nav-'+p).classList.toggle('active', p === page);
  });
  if (page === 'overview') renderOverview();
  if (page === 'streak') renderHeatmap();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function init() {
  loadData();
  // Default to current week based on date (rough estimate: week 0 = April, week 1 = May wk1...)
  const now = new Date();
  const mayStart = new Date(now.getFullYear(), 4, 1);
  const diff = Math.floor((now - mayStart) / (7 * 86400000));
  if (now < mayStart) currentWeek = 0;
  else currentWeek = Math.min(Math.max(1, diff + 1), WEEKS.length - 1);
  
  renderWeek(currentWeek);
  updateDots();
  updateStats();
  scrollDotIntoView(currentWeek);
}

init();
</script>
