<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>室內設計轉職進度</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#eeece8;--border:#dddbd5;
  --text:#1a1a18;--text2:#888880;--text3:#b8b6b0;
  --cad:#1d6fce;--sku:#0d8f5e;--draw:#c4417a;--port:#6d44c4;--model:#c45c10;
  --done:#0d8f5e;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.6;padding-bottom:80px;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 18px 10px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-name{font-size:15px;font-weight:700;}
.app-sub{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px;}
.wnav{display:flex;align-items:center;gap:8px;}
.nbtn{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nbtn:active{background:var(--border);}
.wind{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;min-width:40px;text-align:center;}
.pbar{height:3px;background:var(--border);border-radius:2px;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cad),var(--sku));transition:width .4s;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);}
.sc{background:var(--surface);border-radius:10px;padding:8px 6px;text-align:center;}
.sn{font-size:19px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.sl{font-size:10px;color:var(--text2);margin-top:2px;}

/* WEEK DOTS */
.wdots{display:flex;gap:3px;padding:8px 18px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.wdots::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:10px;font-weight:500;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.wd.active{border-color:var(--text);color:var(--text);background:rgba(26,26,24,.08);}
.wd.full{background:var(--done);border-color:var(--done);color:#fff;}
.wd.part{border-color:var(--sku);color:var(--sku);}

/* MAIN */
.main{padding:14px 18px;}
.wtop{margin-bottom:14px;}
.wlbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;}
.wtitle{font-size:16px;font-weight:700;margin-top:3px;line-height:1.3;}
.wtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.wphase{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text2);font-family:'DM Mono',monospace;}
.wmodel{background:#ffe8d6;color:var(--model);border:1px solid rgba(196,92,16,.25);}
.whrs{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:#ddeeff;color:var(--cad);font-family:'DM Mono',monospace;}

/* DAY SECTION */
.day-section{margin-bottom:10px;}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;}
.day-name{font-size:12px;font-weight:500;}
.day-meta{display:flex;align-items:center;gap:8px;}
.day-hrs{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);}
.day-prog{font-size:10px;color:var(--text3);}
.day-tasks{display:flex;flex-direction:column;gap:6px;padding-left:4px;}

/* TASK CARD */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.tc.done{border-color:rgba(13,143,94,.35);background:#f0fbf6;}
.tc-top{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;}
.ttag{flex-shrink:0;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;min-width:54px;text-align:center;}
.tag-cad{background:#ddeeff;color:var(--cad);}
.tag-sku{background:#d4f5e9;color:var(--sku);}
.tag-draw{background:#fce4ef;color:var(--draw);}
.tag-port{background:#ece4ff;color:var(--port);}
.tag-model{background:#ffe8d6;color:var(--model);}
.tc-info{flex:1;min-width:0;}
.tc-title{font-size:12px;font-weight:500;line-height:1.4;}
.tc-hrs{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px;}
.ck{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;cursor:pointer;}
.ck.done{background:var(--done);border-color:var(--done);color:#fff;}
.tc-detail{font-size:11px;color:var(--text2);line-height:1.6;padding:0 14px 11px;border-top:1px solid var(--border);padding-top:8px;display:none;}
.tc-detail.open{display:block;}

/* CHECK ALL BTN */
.cab{width:calc(100% - 36px);margin:0 18px 14px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:500;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.cab.alldone{background:#e8f9f3;border-color:rgba(13,143,94,.4);color:var(--done);}

/* REMARK */
.remark-wrap{margin-top:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.remark-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:5px;letter-spacing:.04em;display:flex;align-items:center;gap:4px;}
.remark-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--text);resize:none;min-height:52px;line-height:1.5;transition:border-color .2s;outline:none;}
.remark-input:focus{border-color:var(--text2);}
.remark-input::placeholder{color:var(--text3);}
.remark-saved{font-size:10px;color:var(--done);margin-top:4px;height:14px;font-family:'DM Mono',monospace;opacity:0;transition:opacity .3s;}
.remark-saved.show{opacity:1;}

/* FILTER PILLS */
.filter-bar{display:flex;gap:6px;padding:8px 18px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg);}
.filter-bar::-webkit-scrollbar{display:none;}
.fpill{flex-shrink:0;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.fpill:active{opacity:.7;}
.fpill.fall{border-color:var(--text);color:var(--text);background:var(--surface2);}
.fpill.fcad{border-color:var(--cad);color:var(--cad);background:#ddeeff;}
.fpill.fsku{border-color:var(--sku);color:var(--sku);background:#d4f5e9;}
.fpill.fdraw{border-color:var(--draw);color:var(--draw);background:#fce4ef;}
.fpill.fport{border-color:var(--port);color:var(--port);background:#ece4ff;}
.fpill.fmodel{border-color:var(--model);color:var(--model);background:#ffe8d6;}
.day-hidden{display:none;}
.no-task-msg{font-size:12px;color:var(--text3);text-align:center;padding:32px 0;font-family:'DM Mono',monospace;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;color:var(--text3);font-size:10px;transition:color .15s;}
.ni.active{color:var(--text);}
.nicon{font-size:18px;}

/* PAGES */
.page{display:none;padding:14px 18px;}
.page.active{display:block;}
#page-tracker{display:block;}

/* OVERVIEW */
.ov-title{font-size:17px;font-weight:700;margin-bottom:14px;}
.mo-sec{margin-bottom:18px;}
.mo-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:7px;}
.ov-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface);border-radius:10px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;}
.ov-row:active{border-color:var(--border);}
.ov-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);width:34px;flex-shrink:0;}
.ov-info{flex:1;}
.ov-t{font-size:12px;font-weight:500;line-height:1.3;}
.ov-s{font-size:10px;color:var(--text2);margin-top:2px;}
.ov-ds{display:flex;gap:2px;flex-shrink:0;}
.ovd{width:7px;height:7px;border-radius:50%;border:1px solid var(--border);}
.ovd.done{background:var(--done);border-color:var(--done);}

/* STREAK */
.stk-big{text-align:center;padding:36px 0 24px;}
.stk-n{font-size:68px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.stk-l{font-size:13px;color:var(--text2);margin-top:6px;}
.hm{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-top:20px;}
.hc{aspect-ratio:1;border-radius:4px;background:var(--surface2);cursor:pointer;}
.hc.h1{background:#bbeed9;}
.hc.h2{background:#7dd8b5;}
.hc.h3{background:#3cbf8c;}
.hc.h4{background:var(--done);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:9px 18px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="app-name">室內設計轉職</div>
      <div class="app-sub" id="hdr-sub">進度追蹤</div>
    </div>
    <div class="wnav">
      <button class="nbtn" onclick="chgWeek(-1)">‹</button>
      <div class="wind" id="wind">W1</div>
      <button class="nbtn" onclick="chgWeek(1)">›</button>
    </div>
  </div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
</div>

<div class="stats">
  <div class="sc"><div class="sn" id="s-total">18</div><div class="sl">總週數</div></div>
  <div class="sc"><div class="sn" id="s-wdone">0</div><div class="sl">完成週</div></div>
  <div class="sc"><div class="sn" id="s-tasks">0</div><div class="sl">已打卡</div></div>
  <div class="sc"><div class="sn" id="s-streak">0</div><div class="sl">連續天</div></div>
</div>

<div class="wdots" id="wdots"></div>

<div class="filter-bar" id="filter-bar">
  <button class="fpill fall" onclick="setFilter('all')">全部</button>
  <button class="fpill" onclick="setFilter('cad')">AutoCAD</button>
  <button class="fpill" onclick="setFilter('sku')">SketchUp</button>
  <button class="fpill" onclick="setFilter('draw')">手繪</button>
  <button class="fpill" onclick="setFilter('port')">作品集</button>
  <button class="fpill" onclick="setFilter('model')">模型</button>
</div>
<div id="page-tracker">
  <div class="main">
    <div class="wtop">
      <div class="wlbl" id="wlbl">Week 1</div>
      <div class="wtitle" id="wtitle">載入中...</div>
      <div class="wtags">
        <span class="wphase" id="wphase"></span>
        <span class="wphase wmodel" id="wmodel-badge" style="display:none">📦 模型週</span>
        <span class="whrs" id="whrs-badge"></span>
      </div>
    </div>
    <div id="task-list"></div>
  </div>
  <button class="cab" id="cab" onclick="checkAll()">
    <span id="cab-icon">○</span><span id="cab-txt">本週全部打卡</span>
  </button>
</div>

<!-- Overview -->
<div class="page" id="page-overview">
  <div class="ov-title">完整進度總覽</div>
  <div id="ov-content"></div>
</div>

<!-- Streak -->
<div class="page" id="page-streak">
  <div class="stk-big">
    <div class="stk-n" id="stk-n">0</div>
    <div class="stk-l">連續打卡天數</div>
  </div>
  <div class="hm" id="hm"></div>
</div>

<div class="bnav">
  <div class="ni active" id="nav-tracker" onclick="switchPage('tracker')"><div class="nicon">📋</div><div>本週</div></div>
  <div class="ni" id="nav-overview" onclick="switchPage('overview')"><div class="nicon">📅</div><div>總覽</div></div>
  <div class="ni" id="nav-streak" onclick="switchPage('streak')"><div class="nicon">🔥</div><div>連續</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
// phase A = 四月 (weekends only, ~7hr/wk)
// phase B = 五月起 (weekdays 2-3hr + weekends 6-8hr, ~22-28hr/wk)
// Days: 六(Sat) 日(Sun) for phase A; 一三五 / 二四 / 六 / 日 for phase B

const WEEKS = [
{
  id:0, label:"4/13-18", phase:"四月 · 本週平日", isModel:false, totalHrs:"零碎時間",
  title:"安裝軟體 · 靈感板建立 · 案子1初步構想",
  days:[
    { day:"4/14（二）", hrs:"20-30 min", tasks:[
      {type:"cad", title:"安裝 AutoCAD 試用版", hrs:"15 min", detail:"去 Autodesk 官網下載 AutoCAD 試用版（免費30天），安裝好後開啟，確認介面正常。同時打開 SketchUp Free（sketchup.com），登入帳號，確認兩個軟體都能用。"},
      {type:"sku", title:"確認 SketchUp 可以開啟", hrs:"10 min", detail:"SketchUp Free 是網頁版，不需要安裝。進去後點「New Model」，看介面還記得多少，不用做任何練習。"}
    ]},
    { day:"4/15（三）", hrs:"20-30 min", tasks:[
      {type:"port", title:"建立 Pinterest 靈感板", hrs:"20 min", detail:"建立一個名為「室內設計靈感」的板，開始搜尋並儲存 10 張你覺得好看的室內設計照片。不用分析，只是讓眼睛開始看設計。可以搜尋：北歐風客廳、日式臥室、工業風餐廳等關鍵字。"}
    ]},
    { day:"4/16（四）", hrs:"20-30 min", tasks:[
      {type:"port", title:"繼續蒐集靈感 + 觀察共同點", hrs:"20 min", detail:"再存 10 張照片，這次開始注意：你喜歡的圖有什麼共同點？偏暖色還是冷色？木質感還是金屬感？簡潔還是豐富？在備忘錄記下 3 個你發現的自己的偏好。"}
    ]},
    { day:"4/17（五）", hrs:"20-30 min", tasks:[
      {type:"port", title:"案子1 初步構想", hrs:"20 min", detail:"在手機備忘錄寫下作品集案子1的直覺想法：想做什麼空間類型（套房？客廳？）、大概是什麼感覺、給誰住？不需要確定，先把腦子裡的直覺寫出來，之後週末再深化。"}
    ]}
  ]
},
{
  id:1, label:"4/19-20", phase:"四月 · 第一個週末", isModel:false, totalHrs:"約 7 hr",
  title:"AutoCAD 手感回來 · SketchUp 建立盒子 · 靈感分析",
  days:[
    { day:"4/19（六）", hrs:"3.5 hr", tasks:[
      {type:"cad", title:"AutoCAD 跟著教學操作", hrs:"2 hr", detail:"跟著 CAD CAM Tutorials「AutoCAD Interior Design Tutorial for Beginners」第一集開始，一定要跟著畫，不要只看。目標：Line（直線）、Offset（偏移）、Trim（修剪）這三個指令用起來不需要查。畫完一個 3×4m 的空白房間框。"},
      {type:"sku", title:"SketchUp 空白盒子", hrs:"1.5 hr", detail:"跟著 The SketchUp Essentials 入門影片，建一個 5m×4m×2.8m 的空白盒子。重點感受：推拉工具（Push/Pull）、視角旋轉（滑鼠中鍵）、捲尺工具輸入尺寸。完成後從不同角度看看你的盒子。"}
    ]},
    { day:"4/20（日）", hrs:"3.5 hr", tasks:[
      {type:"cad", title:"AutoCAD 自己重畫一遍", hrs:"2 hr", detail:"不看教學，把昨天的 AutoCAD 房間重新畫一次。卡住才查，不要邊看邊畫。這個「自己重做」的動作才是真正建立記憶的關鍵。如果畫完還有時間，試著在牆上開一個門洞（用 Arc 指令畫門弧）。"},
      {type:"port", title:"靈感圖風格分析", hrs:"1.5 hr", detail:"從 Pinterest 靈感板挑出最喜歡的 3 張圖，各用 2-3 句話寫下為什麼喜歡：是色彩？材質？比例？光線感？這是在練習用語言描述設計感受，也是之後寫設計說明的基礎。寫完存到備忘錄。"}
    ]}
  ]
},
{
  id:2, label:"4/21-25", phase:"四月 · 第二週平日", isModel:false, totalHrs:"零碎時間",
  title:"深化靈感 · 確定案子1屋主設定",
  days:[
    { day:"4/21（一）", hrs:"20-30 min", tasks:[
      {type:"cad", title:"預習下週 CAD 內容", hrs:"20 min", detail:"在 YouTube 搜尋「AutoCAD layers tutorial interior design」，看一支 10-15 分鐘的影片了解圖層（Layer）概念。不用跟著操作，只是先在腦子裡有印象，週六才不會生疏。"}
    ]},
    { day:"4/22（二）", hrs:"20-30 min", tasks:[
      {type:"port", title:"蒐集案子1方向靈感", hrs:"20 min", detail:"根據上週末的初步構想，在 Pinterest 找 10 張更符合那個方向的參考圖。比如你想做北歐風套房，就搜尋更具體的關鍵字，例如：「Nordic bedroom small apartment」、「Scandinavian studio apartment」。"}
    ]},
    { day:"4/23（三）", hrs:"20-30 min", tasks:[
      {type:"port", title:"案子1 屋主設定（定人三問）", hrs:"20 min", detail:"在備忘錄用「定人三問」寫出案子1的虛構屋主：① 他幾歲、做什麼工作？② 平日怎麼使用這個空間（早晨、下班後、週末）？③ 他最在乎家裡的什麼感覺？寫成 50-80 字的人物描述，這會是你所有設計決策的出發點。"},
    ]},
    { day:"4/24（四）", hrs:"20-30 min", tasks:[
      {type:"port", title:"根據屋主設定精選參考圖", hrs:"20 min", detail:"回顧你的屋主描述，從靈感板裡挑出最符合那個人的生活感的 5 張圖，建立一個「案子1 核心參考」的專屬分類。這 5 張就是你的 Mood Board 核心。"}
    ]},
    { day:"4/25（五）", hrs:"20-30 min", tasks:[
      {type:"port", title:"整理本週想法，準備週末", hrs:"20 min", detail:"回顧這週的備忘錄：屋主設定寫好了嗎？5 張核心參考圖選好了嗎？在備忘錄新增一條「案子1 設計方向」，用一句話寫下你的設計核心，例如：「一個讓獨居女生下班後完全放鬆的暖調空間」。這句話之後會是作品集的設計說明。"}
    ]}
  ]
},
{
  id:3, label:"4/26-27", phase:"四月 · 第二個週末", isModel:false, totalHrs:"約 7 hr",
  title:"AutoCAD 加深 · SketchUp 開門洞 · 案子1草圖",
  days:[
    { day:"4/26（六）", hrs:"3.5 hr", tasks:[

      {type:"port", title:"面試模擬全套練習", hrs:"2.5 hr", detail:"完整模擬一次面試：自我介紹2分鐘→作品集說明5分鐘→回答常見問題（為何轉職？設計理念？對公司哪個作品有感覺？）。可以請朋友幫忙模擬。"},
      {type:"draw", title:"自由手繪", hrs:"1.5 hr", detail:"享受手繪，不設壓力。"}
    ]}
  ]
},
{
  id:13, label:"第13-17週", phase:"八月+ · 全力求職", isModel:false, totalHrs:"維持約 15-18 hr/週",
  title:"持續求職 · 技能維持 · 保持設計敏感度",
  days:[
    { day:"每週一三", hrs:"各 2 hr", tasks:[
      {type:"cad", title:"CAD＋SketchUp 維持", hrs:"1 hr", detail:"每週維持 2-3hr 軟體練習，保持手感。有餘力可以開始學 Revit 基礎，對建築事務所求職有明顯加分。"},
      {type:"port", title:"積極投遞", hrs:"1 hr", detail:"持續向目標公司投遞，每週 5-10 家。根據面試回饋調整策略。"}
    ]},
    { day:"每週二四", hrs:"各 1.5 hr", tasks:[
      {type:"draw", title:"手繪維持＋面試模擬", hrs:"45 min", detail:"每週 2-3 張草圖保持手感，重點練習面試情境：邊說明邊畫、快速平面草圖、建築外觀透視。"},
      {type:"port", title:"面試準備＋追蹤", hrs:"1 hr", detail:"針對有面試通知的公司深度準備，同時追蹤已投遞的狀態。"}
    ]},
    { day:"週六", hrs:"4-5 hr", tasks:[
      {type:"port", title:"求職衝刺", hrs:"2.5 hr", detail:"研究公司、模擬面試、更新投遞。如果面試多了，把時間集中在最有可能的機會上。"},
      {type:"draw", title:"手繪練習", hrs:"1 hr", detail:"維持手感。"},
      {type:"sku", title:"自由建模", hrs:"1 hr", detail:"維持技術，探索新的建模方式。"}
    ]},
    { day:"週日", hrs:"3-4 hr", tasks:[
      {type:"port", title:"求職策略週回顧", hrs:"1.5 hr", detail:"每週回顧：投了幾家？有幾家有回音？哪個類型的公司最有反應？根據資料調整策略。"},
      {type:"draw", title:"自由手繪", hrs:"1.5 hr", detail:"維持設計敏感度，享受手繪。"}
    ]}
  ]
}
];

const TAG_MAP={cad:"CAD",sku:"Sketch",draw:"手繪",port:"作品集",model:"模型"};
const TAG_CLS={cad:"tag-cad",sku:"tag-sku",draw:"tag-draw",port:"tag-port",model:"tag-model"};

let curWeek=0, curPage='tracker', data={}, checkDates=[], remarks={}, curFilter='all';

function load(){
  try{const r=localStorage.getItem('idtrk2');if(r){const p=JSON.parse(r);data=p.d||{};checkDates=p.c||[];remarks=p.r||{};}}catch(e){}
}
function save(){
  try{localStorage.setItem('idtrk2',JSON.stringify({d:data,c:checkDates,r:remarks}));}catch(e){}
}
function key(w,d,t){return `w${w}d${d}t${t}`;}
function isDone(w,d,t){return data[key(w,d,t)]===true;}
function totalTasks(wIdx){return WEEKS[wIdx].days.reduce((s,d)=>s+d.tasks.length,0);}
function doneTasks(wIdx){return WEEKS[wIdx].days.reduce((s,d,di)=>s+d.tasks.filter((_,ti)=>isDone(wIdx,di,ti)).length,0);}

function toggle(wIdx,dIdx,tIdx){
  const k=key(wIdx,dIdx,tIdx);
  data[k]=!data[k];
  const today=new Date().toDateString();
  if(data[k]&&!checkDates.includes(today))checkDates.push(today);
  save();
  renderWeek(wIdx);
  updateStats();
  updateDots();
}

function checkAll(){
  const w=WEEKS[curWeek];
  const total=totalTasks(curWeek);
  const done=doneTasks(curWeek);
  const allDone=done===total;
  const today=new Date().toDateString();
  w.days.forEach((d,di)=>d.tasks.forEach((_,ti)=>{data[key(curWeek,di,ti)]=!allDone;}));
  if(!allDone&&!checkDates.includes(today))checkDates.push(today);
  save();
  renderWeek(curWeek);
  updateStats();
  updateDots();
  showToast(allDone?"已取消本週打卡":"🎉 本週全部完成！");
}

function setFilter(f){
  curFilter=f;
  // update pill styles
  document.querySelectorAll('.fpill').forEach(p=>p.className='fpill');
  const map={all:'fall',cad:'fcad',sku:'fsku',draw:'fdraw',port:'fport',model:'fmodel'};
  const btn=document.querySelector(`.fpill[onclick="setFilter('${f}')"]`);
  if(btn) btn.classList.add(map[f]||'fall');
  renderWeek(curWeek);
}

function renderWeek(wIdx){
  const w=WEEKS[wIdx];
  document.getElementById('wlbl').textContent=w.label;
  document.getElementById('wtitle').textContent=w.title;
  document.getElementById('wphase').textContent=w.phase;
  document.getElementById('wmodel-badge').style.display=w.isModel?'inline-block':'none';
  document.getElementById('whrs-badge').textContent='🕐 '+w.totalHrs;
  const aprLabels=['4/13','4/19','4/21','4/26'];
  document.getElementById('wind').textContent=wIdx<4?aprLabels[wIdx]:'W'+(wIdx-3);
  document.getElementById('hdr-sub').textContent=w.label+' · '+w.phase;

  const list=document.getElementById('task-list');
  list.innerHTML='';

  let anyVisible=false;

  w.days.forEach((day,di)=>{
    const filteredTasks=curFilter==='all'?day.tasks:day.tasks.filter(t=>t.type===curFilter);
    if(filteredTasks.length===0) return; // skip whole day section
    anyVisible=true;

    const dayDone=filteredTasks.filter((_,ri)=>{
      const ti=curFilter==='all'?ri:day.tasks.indexOf(filteredTasks[ri]);
      return isDone(wIdx,di,ti);
    }).length;
    const dayTotal=filteredTasks.length;

    const sec=document.createElement('div');
    sec.className='day-section';
    sec.innerHTML=`
      <div class="day-header">
        <span class="day-name">${day.day}</span>
        <div class="day-meta">
          <span class="day-hrs">${day.hrs}</span>
          <span class="day-prog">${dayDone}/${dayTotal}</span>
        </div>
      </div>
      <div class="day-tasks" id="day-body-${wIdx}-${di}"></div>
    `;
    list.appendChild(sec);
    const body=sec.querySelector('.day-tasks');

    filteredTasks.forEach((task)=>{
      const ti=day.tasks.indexOf(task);
      const done=isDone(wIdx,di,ti);
      const tc=document.createElement('div');
      tc.className='tc'+(done?' done':'');
      tc.innerHTML=`
        <div class="tc-top" onclick="toggleDetail('det-${wIdx}-${di}-${ti}')">
          <span class="ttag ${TAG_CLS[task.type]}">${TAG_MAP[task.type]}</span>
          <div class="tc-info">
            <div class="tc-title">${task.title}</div>
            <div class="tc-hrs">⏱ ${task.hrs}</div>
          </div>
          <div class="ck${done?' done':''}" onclick="event.stopPropagation();toggle(${wIdx},${di},${ti})">${done?'✓':''}</div>
        </div>
        <div class="tc-detail" id="det-${wIdx}-${di}-${ti}">${task.detail}</div>
      `;
      body.appendChild(tc);
    });

    // only show remark box when showing all tasks or when this day has tasks of the filtered type
    if(curFilter==='all'){
      const remarkKey=`rmk_w${wIdx}_d${di}`;
      const remarkWrap=document.createElement('div');
      remarkWrap.className='remark-wrap';
      remarkWrap.innerHTML=`
        <div class="remark-label">✏️ 今日學習備忘</div>
        <textarea class="remark-input" id="${remarkKey}" placeholder="記下今天的收穫、卡關點、或想繼續做的事...">${remarks[remarkKey]||''}</textarea>
        <div class="remark-saved" id="${remarkKey}-saved">已儲存</div>
      `;
      body.appendChild(remarkWrap);
      const ta=remarkWrap.querySelector('textarea');
      let saveTimer;
      ta.addEventListener('input',()=>{
        remarks[remarkKey]=ta.value;
        clearTimeout(saveTimer);
        saveTimer=setTimeout(()=>{
          save();
          const savedEl=document.getElementById(remarkKey+'-saved');
          if(savedEl){savedEl.classList.add('show');setTimeout(()=>savedEl.classList.remove('show'),1500);}
        },600);
      });
    }
  });

  if(!anyVisible){
    const msg=document.createElement('div');
    msg.className='no-task-msg';
    const labels={cad:'AutoCAD',sku:'SketchUp',draw:'手繪',port:'作品集',model:'模型'};
    msg.textContent=`本週沒有 ${labels[curFilter]||''} 的任務`;
    list.appendChild(msg);
  }

  const total=totalTasks(wIdx),done=doneTasks(wIdx),allDone=done===total;
  const btn=document.getElementById('cab');
  btn.className='cab'+(allDone?' alldone':'');
  document.getElementById('cab-icon').textContent=allDone?'✓':'○';
  document.getElementById('cab-txt').textContent=allDone?'本週已全部完成':'本週全部打卡';
}

function toggleDetail(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function updateStats(){
  const total=WEEKS.reduce((s,_,i)=>s+doneTasks(i),0);
  const wdone=WEEKS.filter((_,i)=>{const t=totalTasks(i);return t>0&&doneTasks(i)===t;}).length;
  const streak=calcStreak();
  const allTotal=WEEKS.reduce((s,_,i)=>s+totalTasks(i),0);
  document.getElementById('s-total').textContent=WEEKS.length;
  document.getElementById('s-wdone').textContent=wdone;
  document.getElementById('s-tasks').textContent=total;
  document.getElementById('s-streak').textContent=streak;
  document.getElementById('stk-n').textContent=streak;
  document.getElementById('pfill').style.width=Math.round(total/allTotal*100)+'%';
}

function calcStreak(){
  if(!checkDates.length)return 0;
  const sorted=[...new Set(checkDates)].sort((a,b)=>new Date(b)-new Date(a));
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  for(let d of sorted){
    const dd=new Date(d);dd.setHours(0,0,0,0);
    const diff=Math.round((cur-dd)/86400000);
    if(diff<=1){streak++;cur=dd;}else break;
  }
  return streak;
}

function updateDots(){
  const c=document.getElementById('wdots');c.innerHTML='';
  WEEKS.forEach((_,i)=>{
    const done=doneTasks(i),total=totalTasks(i);
    const d=document.createElement('div');
    d.className='wd';
    const aprShort=['4/13','4/19','4/21','4/26'];
    d.textContent=i<4?aprShort[i]:'W'+(i-3);
    d.style.fontSize=i<4?'8px':'10px';
    if(i===curWeek)d.classList.add('active');
    if(total>0&&done===total)d.classList.add('full');
    else if(done>0)d.classList.add('part');
    d.onclick=()=>{curWeek=i;renderWeek(i);updateDots();scrollDot(i);switchPage('tracker');};
    c.appendChild(d);
  });
}

function scrollDot(i){
  const dots=document.querySelectorAll('.wd');
  if(dots[i])dots[i].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function chgWeek(dir){
  const n=curWeek+dir;
  if(n>=0&&n<WEEKS.length){curWeek=n;renderWeek(n);updateDots();scrollDot(n);if(curPage!=='tracker')switchPage('tracker');}
}

function switchPage(p){
  curPage=p;
  const pages=['tracker','overview','streak'];
  pages.forEach(pg=>{
    const el=document.getElementById('page-'+pg);
    if(pg==='tracker'){el.style.display=p==='tracker'?'block':'none';}
    else{el.classList.toggle('active',p===pg);}
    document.getElementById('nav-'+pg).classList.toggle('active',p===pg);
  });
  if(p==='overview')renderOverview();
  if(p==='streak')renderHeatmap();
}

function renderOverview(){
  const months=[
    {label:"四月底前 · 暖身",range:[0,3]},
    {label:"五月 · 設計發展",range:[4,7]},
    {label:"六月 · 圖面深化",range:[8,11]},
    {label:"七月 · 作品集完成",range:[12,15]},
    {label:"八月+ · 全力求職",range:[16,16]},
  ];
  const c=document.getElementById('ov-content');c.innerHTML='';
  months.forEach(m=>{
    const sec=document.createElement('div');sec.className='mo-sec';
    sec.innerHTML=`<div class="mo-lbl">${m.label}</div>`;
    for(let i=m.range[0];i<=m.range[1];i++){
      const w=WEEKS[i];
      const done=doneTasks(i),total=totalTasks(i);
      const row=document.createElement('div');row.className='ov-row';
      const dotsHtml=Array.from({length:Math.min(total,8)},(_,j)=>`<div class="ovd${isDone(i,Math.floor(j/w.days[0].tasks.length),j%w.days[0].tasks.length)?' done':''}"></div>`).join('');
      row.innerHTML=`
        <div class="ov-num">${w.label}</div>
        <div class="ov-info">
          <div class="ov-t">${w.title}</div>
          <div class="ov-s">${done}/${total} · ${w.totalHrs}</div>
        </div>
        <div class="ov-ds">${dotsHtml}</div>
      `;
      row.onclick=()=>{curWeek=i;renderWeek(i);switchPage('tracker');updateDots();scrollDot(i);};
      sec.appendChild(row);
    }
    c.appendChild(sec);
  });
}

function renderHeatmap(){
  const hm=document.getElementById('hm');hm.innerHTML='';
  for(let i=0;i<WEEKS.length;i++){
    const done=doneTasks(i),total=totalTasks(i);
    const level=total===0?0:Math.ceil(done/total*4);
    const cell=document.createElement('div');
    cell.className=`hc h${level}`;
    cell.title=WEEKS[i].label;
    cell.onclick=()=>{curWeek=i;renderWeek(i);switchPage('tracker');updateDots();};
    hm.appendChild(cell);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function init(){
  load();
  const now=new Date();
  const may1=new Date(now.getFullYear(),4,1);
  const apr19=new Date(now.getFullYear(),3,19);
  const apr21=new Date(now.getFullYear(),3,21);
  const apr26=new Date(now.getFullYear(),3,26);
  let startWeek=0;
  if(now>=may1) startWeek=Math.min(3+Math.floor((now-may1)/(7*86400000))+1, WEEKS.length-1);
  else if(now>=apr26) startWeek=3;
  else if(now>=apr21) startWeek=2;
  else if(now>=apr19) startWeek=1;
  else startWeek=0;
  curWeek=startWeek;
  renderWeek(curWeek);
  updateDots();
  updateStats();
  scrollDot(curWeek);
  setFilter('all');
}

init();
</script>
</body>
</html>
